<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DynaPuff:wght@400..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css" />
<title>PintheDogs</title>
</head>
<body>

<header class="header">
    <div class="logo-area">
    <img class="logo" src="logo-dog.webp" alt="Logo">
    <h1>PINTHEDOGS</h1>
    </div>

    <div class="search-box">
    <i class="bi bi-search"></i>
    <input type="text" placeholder="Pesquise seu aumigo...">
    </div>

    <div class="paw-icons">
    <i class="bi bi-paw-fill"></i>
    <i class="bi bi-paw-fill"></i>
    </div>
</header>

<main class="main">
    <section class="panel">

    <div class="top-bar">
        <div class="user-info">
        <div class="user-avatar">
            <i class="bi bi-person-fill"></i>
        </div>
        <span>Usuário123</span>
        </div>

        <button class="favorite-btn">
        <i class="bi bi-heart-fill"></i>
        </button>
    </div>

    <section class="dog-grid">
<div class="dog-card" data-dog-name="Dog 1">          
            <input type="checkbox" id="heart1" class="heart-check">
            <label for="heart1" class="heart-icon">
            <i class="bi bi-heart"></i>
            <i class="bi bi-heart-fill"></i>
            </label>
        </div>


<div class="dog-card" data-dog-name="Dog 2">
